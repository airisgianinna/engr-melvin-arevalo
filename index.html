<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday Engr. Melvin Arevalo</title>

<style> 
  

body{
background:#f5f0e6;
font-family:Arial, sans-serif;
margin:0;
text-align:center;
overflow:hidden;
}

.container{
margin-top:60px;
}

h1{
font-size:60px;
margin:0;
}

h2{
font-size:35px;
margin-top:10px;
}

p{
font-size:18px;
color:#555;
}

button{
padding:15px 35px;
font-size:20px;
background:#333;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:black;
}

img{
width:360px;
border-radius:25px;
margin-top:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(5px);
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:40px;
border-radius:25px;
width:320px;
}

.firework{
position:absolute;
font-size:40px;
animation:explode 1.5s infinite;
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday</h1>

<h2>Engr. Melvin Arevalo</h2>

<p>Wishing you a day full of happiness and beautiful memories.</p>

<img src="engr.jpg">

<br>

<button onclick="makeWish()">Make a Wish</button>

</div>

<div class="overlay" id="overlay">

<div class="card">

<h2>🎉 Your wish is glowing 🎉</h2>

<p>May your birthday be filled with joy, love, and blessings.</p>

<h1>🎂</h1>

<button onclick="closeWish()">Close</button>

</div>

</div>

<audio id="song">
<source src="happy-birthday.mp3" type="audio/mpeg">
</audio>

<script>

function makeWish(){

document.getElementById("overlay").style.display="flex";

document.getElementById("song").play();

for(let i=0;i<25;i++){

let fire=document.createElement("div");

fire.className="firework";

fire.innerHTML=["🎆","✨","🎇","💫"][Math.floor(Math.random()*4)];

fire.style.left=Math.random()*100+"%";
fire.style.top=Math.random()*100+"%";

document.body.appendChild(fire);

}

}

function closeWish(){

document.getElementById("overlay").style.display="none";

document.getElementById("song").pause();

}

</script>

</body>
</html>
